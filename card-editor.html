<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RuneScape TCG Card Editor</title>
    <link rel="stylesheet" href="./src/card-editor.css">
  </head>
  <body>
    <header class="editor-header">
      <div>
        <p>RuneScape TCG</p>
        <h1>Card Editor</h1>
      </div>
      <div class="header-actions">
        <button id="addButton" type="button">Add card</button>
        <button id="openButton" type="button">Open JSON</button>
        <button id="saveButton" class="primary" type="button">Save JSON</button>
        <input id="fileInput" type="file" accept="application/json,.json" hidden>
      </div>
    </header>

    <main class="editor-layout">
      <aside class="catalogue-panel" aria-label="Card catalogue">
        <div class="filters">
          <input id="searchInput" type="search" placeholder="Search cards" aria-label="Search cards">
          <select id="rarityFilter" aria-label="Filter by rarity"><option value="">All rarities</option></select>
          <select id="typeFilter" aria-label="Filter by type"><option value="">All types</option></select>
          <select id="imageFilter" aria-label="Filter by image">
            <option value="">All images</option>
            <option value="present">Has image</option>
            <option value="missing">Missing image</option>
          </select>
        </div>
        <div class="result-summary">
          <label class="select-all"><input id="selectAllCards" type="checkbox">Select all</label>
          <span id="resultCount">Loading cards</span>
          <span id="dirtyStatus">Saved</span>
        </div>
        <div id="cardList" class="card-list" role="listbox" aria-label="Cards"></div>
        <div class="pagination">
          <button id="previousPage" type="button" title="Previous page" aria-label="Previous page">&#8592;</button>
          <span id="pageStatus">Page 1</span>
          <button id="nextPage" type="button" title="Next page" aria-label="Next page">&#8594;</button>
        </div>
      </aside>

      <section class="preview-panel" aria-label="Card preview">
        <div id="cardPreview" class="preview-card common">
          <div class="preview-top"><span id="previewRarity">Common</span><span id="previewId">Card</span></div>
          <div class="preview-art"><img id="previewImage" alt=""><span id="previewFallback">?</span></div>
          <h2 id="previewName">Select a card</h2>
          <small id="previewType">Type</small>
          <small id="previewValue" class="preview-value">Value: 0 credits</small>
          <p id="previewExamine">Choose a card from the catalogue to begin editing.</p>
        </div>
      </section>

      <section class="form-panel" aria-label="Card fields">
        <form id="cardForm">
          <div class="form-heading">
            <div><p>Selected card</p><h2 id="formTitle">No card selected</h2></div>
            <div class="form-actions">
              <button id="revertButton" type="button" disabled>Revert</button>
              <button id="deleteButton" class="danger" type="button" disabled>Delete card</button>
            </div>
          </div>
          <fieldset id="cardFields" disabled>
            <label class="wide">Name<input name="name" type="text" required></label>
            <label>Rarity<select name="rarity"></select></label>
            <label>Quest item<select name="questItem"><option value="false">No</option><option value="true">Yes</option></select></label>
            <label class="wide">Description<textarea name="examine" rows="5"></textarea></label>
            <label class="wide">Categories<input name="category" type="text" placeholder="Item, Melee"></label>
            <label class="wide">Image URL<input name="imageUrl" type="url"></label>
            <label class="wide">Wiki title<input name="wikiTitle" type="text"></label>
            <label>Level<input name="level" type="number" step="1"></label>
            <label>Card value<input name="value" type="number" step="1"></label>
            <label>GE value<input name="geValue" type="number" step="1"></label>
            <label>High alch<input name="highAlchValue" type="number" step="1"></label>
            <label>Skill XP<input name="experience" type="number" step="any"></label>
            <label>Override score<input name="overrideScore" type="number" step="any"></label>
            <label class="wide">Card ID<input name="id" type="text" readonly></label>
          </fieldset>
        </form>
      </section>
    </main>
    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
    <script src="./src/card-editor.js"></script>
  </body>
</html>
